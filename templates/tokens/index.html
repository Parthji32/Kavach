{{define "content"}}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-white">Tokens</h1>
    <a href="/tokens/new" class="flex items-center gap-2 bg-kavach-accent hover:bg-kavach-accent-hover text-kavach-dark px-4 py-2 rounded-lg text-sm font-semibold transition">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        New Token
    </a>
</div>

<!-- Filters -->
<div class="flex items-center gap-3 mb-4">
    <button class="px-3 py-1.5 text-xs font-medium rounded-lg bg-kavach-accent/10 text-kavach-accent border border-kavach-accent/30">All</button>
    <button class="px-3 py-1.5 text-xs font-medium rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">URL</button>
    <button class="px-3 py-1.5 text-xs font-medium rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">Document</button>
    <button class="px-3 py-1.5 text-xs font-medium rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">API Key</button>
    <button class="px-3 py-1.5 text-xs font-medium rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">DNS</button>
    <button class="px-3 py-1.5 text-xs font-medium rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">Email</button>
    <button class="px-3 py-1.5 text-xs font-medium rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">QR Code</button>
    <button class="px-3 py-1.5 text-xs font-medium rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">Cloned Site</button>
    <button class="px-3 py-1.5 text-xs font-medium rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">Tracking Pixel</button>
    <button class="px-3 py-1.5 text-xs font-medium rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition">AWS Key</button>
</div>

<!-- Token Table -->
<div class="bg-kavach-darker border border-kavach-border rounded-xl overflow-hidden">
    <table class="w-full">
        <thead>
            <tr class="text-[11px] uppercase tracking-wider text-gray-500 border-b border-kavach-border">
                <th class="text-left px-5 py-3">Name</th>
                <th class="text-left px-5 py-3">Type</th>
                <th class="text-left px-5 py-3">Status</th>
                <th class="text-left px-5 py-3">Triggers</th>
                <th class="text-left px-5 py-3">Last Triggered</th>
                <th class="text-left px-5 py-3">Created</th>
                <th class="text-left px-5 py-3">Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .Tokens}}
            <tr class="border-t border-kavach-border/50 hover:bg-white/[0.02] transition">
                <td class="px-5 py-3">
                    <div>
                        <p class="text-sm font-medium text-gray-200">{{.Name}}</p>
                        <p class="text-xs text-gray-500 mt-0.5">{{.Description}}</p>
                    </div>
                </td>
                <td class="px-5 py-3">
                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium
                        {{if eq .Type "url"}}bg-blue-500/15 text-blue-400
                        {{else if eq .Type "document"}}bg-purple-500/15 text-purple-400
                        {{else if eq .Type "api_key"}}bg-amber-500/15 text-amber-400
                        {{else if eq .Type "dns"}}bg-kavach-accent/15 text-kavach-accent
                        {{else if eq .Type "email"}}bg-pink-500/15 text-pink-400
                        {{else if eq .Type "qr_code"}}bg-teal-500/15 text-teal-400
                        {{else if eq .Type "cloned_site"}}bg-indigo-500/15 text-indigo-400
                        {{else if eq .Type "web_image"}}bg-rose-500/15 text-rose-400
                        {{else if eq .Type "aws_key"}}bg-orange-500/15 text-orange-400
                        {{else}}bg-gray-500/15 text-gray-400{{end}}">
                        {{.Type}}
                    </span>
                </td>
                <td class="px-5 py-3">
                    <span class="inline-flex items-center gap-1.5 text-xs">
                        <span class="w-2 h-2 rounded-full {{if .IsTriggered}}bg-red-500 animate-pulse-dot{{else}}bg-kavach-accent{{end}}"></span>
                        {{if .IsTriggered}}Triggered{{else}}Active{{end}}
                    </span>
                </td>
                <td class="px-5 py-3 text-sm font-mono {{if gt .TriggerCount 5}}text-red-400 font-semibold{{else}}text-gray-400{{end}}">{{.TriggerCount}}</td>
                <td class="px-5 py-3 text-xs text-gray-500">{{.LastTriggered}}</td>
                <td class="px-5 py-3 text-xs text-gray-500">{{.CreatedAt}}</td>
                <td class="px-5 py-3">
                    <div class="flex items-center gap-2">
                        <button onclick="copyToClipboard(this, '{{.Payload}}')" class="text-gray-400 hover:text-kavach-accent transition" title="Copy payload">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
                        </button>
                        <button class="text-gray-400 hover:text-red-400 transition" title="Deactivate">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9z" clip-rule="evenodd"/></svg>
                        </button>
                    </div>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
